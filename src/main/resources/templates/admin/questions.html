<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${title}">Manage Questions</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="admin-header">
            <h1 th:text="'root@admin:~/quizzes/' + ${quiz.id} + '/questions$'">root@admin:~/quizzes/1/questions$</h1>
            <div class="admin-actions">
                <a th:href="@{/admin/courses/{id}/quizzes(id=${quiz.course.id})}" class="btn btn-outline">
                    <i class="bi bi-arrow-left"></i> back_to_quizzes()
                </a>
            </div>
        </div>

        <div class="questions-list" style="margin-bottom: 40px;">
            <div th:each="question, qStat : ${quiz.questions}" class="post-form-container" style="margin-bottom: 24px; padding: 24px; border: 1px solid var(--border-color);">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                    <h3 th:text="${qStat.count} + '. ' + ${question.text}" style="margin: 0; color: var(--accent-blue);">Question text</h3>
                    <a th:href="@{/admin/delete-question/{quizId}/{questionId}(quizId=${quiz.id}, questionId=${question.id})}" 
                       class="btn btn-outline btn-delete" 
                       style="padding: 4px 8px; font-size: 0.75rem;"
                       onclick="return confirm('rm -rf this_question?')">
                        <i class="bi bi-trash3"></i> DELETE
                    </a>
                </div>
                <ul style="list-style: none; padding: 0;">
                    <li th:each="option : ${question.options}" style="margin-bottom: 8px; display: flex; align-items: center;">
                        <i th:class="${option.isCorrect} ? 'bi bi-check-circle-fill text-success' : 'bi bi-circle text-dim'" style="margin-right: 12px;"></i>
                        <span th:text="${option.text}" th:style="${option.isCorrect} ? 'color: var(--accent-green);' : ''">Option text</span>
                    </li>
                </ul>
            </div>
            
            <div th:if="${#lists.isEmpty(quiz.questions)}" style="text-align: center; padding: 40px; color: var(--text-dim); border: 1px dashed var(--border-color); border-radius: 8px;">
                No questions found. Use the form below to add_question().
            </div>
        </div>

        <div class="post-form-container fade-in">
            <h2 style="margin-bottom: 24px; color: var(--accent-green); font-family: var(--font-mono); font-size: 1.25rem;">
                <i class="bi bi-plus-lg"></i> add_new_question()
            </h2>
            <form th:action="@{/admin/quizzes/{id}/questions(id=${quiz.id})}" method="POST">
                <div class="form-group">
                    <label for="text" class="form-label">// STRING: question_text</label>
                    <textarea id="text" name="text" rows="3" placeholder="What is the main advantage of Spring Boot?" class="form-control" required></textarea>
                </div>

                <div class="options-container">
                    <label class="form-label">// OPTIONS: (mark the correct one)</label>
                    <div th:each="i : ${#numbers.sequence(0, 3)}" class="form-group" style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                        <input type="radio" name="correctOptionIndex" th:value="${i}" th:checked="${i == 0}" required>
                        <input type="text" name="optionText" th:placeholder="'Option ' + (${i} + 1)" class="form-control" required>
                    </div>
                </div>

                <div style="margin-top: 32px;">
                    <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                        <i class="bi bi-terminal"></i> deploy_question()
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
