<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/cabinet-layout}">
<head>
    <title>Admin Dashboard</title>
</head>
<body>
    <div layout:fragment="cabinet-content">
        <div class="card-glass" style="padding: 30px; margin-bottom: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 style="margin: 0;">Управление контентом</h1>
                <a th:href="@{/admin/add-post}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> Новый пост
                </a>
            </div>
            
            <div class="table-responsive" style="margin-top: 20px;">
                <table class="table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid var(--border-subtle);">
                            <th style="padding: 12px;">Заголовок</th>
                            <th style="padding: 12px;">Категория</th>
                            <th style="padding: 12px;">Дата</th>
                            <th style="padding: 12px; text-align: right;">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="post : ${data}" style="border-bottom: 1px solid var(--border-subtle);">
                            <td style="padding: 12px;" th:text="${post.title}">Title</td>
                            <td style="padding: 12px;">
                                <span class="badge" th:text="${post.category.name}">Category</span>
                            </td>
                            <td style="padding: 12px;" th:text="${#temporals.format(post.createdAt, 'dd.MM.yyyy')}">01.01.2024</td>
                            <td style="padding: 12px; text-align: right;">
                                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                                    <a th:href="@{'/admin/edit-post/' + ${post.id}}" class="btn-text" title="Редактировать">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{'/admin/delete-post/' + ${post.id}}" class="btn-text" style="color: #ff4d4d;" 
                                       onclick="return confirm('Вы уверены?')" title="Удалить">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${data.empty}">
                            <td colspan="4" class="empty-state">Постов пока нет.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
