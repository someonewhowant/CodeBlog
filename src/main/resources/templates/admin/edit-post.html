<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Edit Post</title>
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <style>
        .EasyMDEContainer { background: var(--bg-dark); border-radius: var(--radius); margin-top: 8px; }
        .editor-toolbar { border-color: var(--border-subtle) !important; background: var(--bg-surface) !important; border-radius: var(--radius) var(--radius) 0 0 !important; }
        .editor-toolbar button { color: var(--text-main) !important; }
        .editor-toolbar button:hover, .editor-toolbar button.active { background: var(--bg-dark) !important; border-color: var(--border-active) !important; }
        .CodeMirror { background: var(--bg-dark) !important; color: var(--text-main) !important; border-color: var(--border-subtle) !important; border-radius: 0 0 var(--radius) var(--radius) !important; font-family: var(--font-mono) !important; }
        .editor-preview-active { background: var(--bg-dark) !important; color: var(--text-main) !important; }
        .editor-statusbar { color: var(--text-dim) !important; }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="admin-header" style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;">
            <h1 class="author__heading" style="font-size: 1.8rem; margin: 0;">edit_post.py</h1>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline" style="color: var(--accent-orange); border-color: var(--accent-orange);">
                <i class="bi bi-x-lg"></i> discard_changes()
            </a>
        </div>
        
        <div class="card-glass" style="padding: 40px;">
            <form th:action="@{/admin/edit-post/{id}(id=${post.id})}" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label for="title" class="form-label">// STRING: title</label>
                    <input type="text" id="title" name="title" th:value="${post.title}" placeholder="Post Title" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="image" class="form-label" style="color: var(--accent-orange);">// FILE: image (leave empty to keep current)</label>
                    <input type="file" id="image" name="image" accept="image/*" class="form-control">
                    <div th:if="${post.imageUrl}" style="margin-top: 16px; display: flex; align-items: center; gap: 16px;">
                        <img th:src="${post.imageUrl}" style="max-width: 120px; border-radius: var(--radius); border: 1px solid var(--border-subtle);">
                        <span style="color: var(--text-dim); font-size: 0.85rem; font-family: var(--font-mono);">Current asset path</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="body" class="form-label" style="color: var(--accent-purple);">// TEXT: body (markdown)</label>
                    <textarea id="body" name="body" th:text="${post.body}" rows="15" placeholder="Content..." class="form-control"></textarea>
                </div>

                <div style="margin-top: 32px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; height: 56px; font-size: 1.1rem; font-weight: 600;">
                        <i class="bi bi-check-lg"></i> push_updates()
                    </button>
                </div>
            </form>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
        <script>
            const easyMDE = new EasyMDE({
                element: document.getElementById('body'),
                spellChecker: false,
                status: false,
                minHeight: "400px",
                toolbar: ["bold", "italic", "heading", "|", "quote", "unordered-list", "ordered-list", "|", "link", "image", "|", "preview", "side-by-side", "fullscreen", "|", "guide"]
            });
        </script>
    </th:block>
</body>
</html>
