<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${title}">Profile</title>
</head>
<body>
    <div layout:fragment="content" class="container" style="padding-top: 60px;">
        <div class="card-glass" style="padding: 40px; max-width: 600px; margin: 0 auto;">
            <h1>Настройки профиля</h1>
            
            <div th:if="${param.success}" class="alert alert-success" style="margin-top: 20px;">
                Профиль успешно обновлен!
            </div>

            <form th:action="@{/student/profile}" method="POST" enctype="multipart/form-data" style="margin-top: 30px;">
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="width: 120px; height: 120px; border-radius: 50%; overflow: hidden; margin: 0 auto 15px; border: 3px solid var(--accent-color);">
                        <img th:src="${user.avatarUrl != null ? user.avatarUrl : '/img/hero-image.webp'}" 
                             alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <label for="avatar" class="btn btn-outline" style="cursor: pointer; font-size: 14px;">Изменить фото</label>
                    <input type="file" id="avatar" name="avatar" style="display: none;" accept="image/*">
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="fullName">ФИО</label>
                    <input type="text" id="fullName" name="fullName" th:value="${user.fullName}" 
                           class="form-control" placeholder="Введите ваше ФИО" required>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="phoneNumber">Номер телефона</label>
                    <input type="text" id="phoneNumber" name="phoneNumber" th:value="${user.phoneNumber}" 
                           class="form-control" placeholder="+7 (___) ___-__-__">
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Имя пользователя (недоступно для редактирования)</label>
                    <input type="text" th:value="${user.username}" class="form-control" readonly style="opacity: 0.6;">
                </div>

                <div style="margin-top: 30px; display: flex; gap: 16px;">
                    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    <a th:href="@{/student/dashboard}" class="btn btn-outline">Назад в кабинет</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
