<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Search Results</title>
</head>
<body>
    <div layout:fragment="content">
        <h1 class="author__heading" style="margin-bottom: 40px; font-size: 1.8rem;">
            grep -r "<span style="color: var(--accent-green);" th:text="${searchTerm}"></span>" .
        </h1>
        
        <ul class="article-grid" th:if="${not #lists.isEmpty(data)}">
            <li th:each="post : ${data}">
                <a th:href="@{/post/{id}(id=${post.id})}">
                    <div class="article-card__image-container">
                        <img th:if="${post.imageUrl}" 
                             th:src="${post.imageUrl}" 
                             th:alt="${post.title}" 
                             class="article-card__image"
                             loading="lazy"
                             decoding="async">
                        <div th:unless="${post.imageUrl}" class="article-card__placeholder"></div>
                    </div>
                    <div class="article-card__content">
                        <div class="article-card__meta">
                            <span class="article-list__date" th:text="${#temporals.format(post.createdAt, 'MMMM dd, yyyy')}">Date</span>
                            <span th:if="${post.category}" style="color: var(--text-dim); opacity: 0.5;">|</span>
                            <a th:if="${post.category}" 
                               th:href="@{/category/{slug}(slug=${post.category.slug})}" 
                               th:text="${post.category.name}"
                               class="article-card__category">Category</a>
                        </div>
                        <span class="article-card__title" th:text="${post.title}">Post Title</span>
                        <p th:text="${#strings.abbreviate(post.body, 120)}"></p>
                        <div th:if="${post.tags != null and not #sets.isEmpty(post.tags)}" class="article-card__tags">
                            <a th:each="tag : ${post.tags}" 
                               th:href="@{/tag/{slug}(slug=${tag.slug})}" 
                               th:text="'#' + ${tag.name}"
                               class="badge-tag">#tag</a>
                        </div>
                    </div>
                </a>
            </li>
        </ul>
        
        <div th:if="${#lists.isEmpty(data)}" style="text-align: center; padding: 80px 0; background: var(--bg-surface); border-radius: var(--radius); border: 1px dashed var(--border-subtle);">
            <div style="font-family: var(--font-mono); font-size: 3rem; color: var(--accent-orange); opacity: 0.5; margin-bottom: 24px;">404</div>
            <p style="font-family: var(--font-mono); font-size: 1.2rem; color: var(--text-main);">STDOUT: No results found for current query.</p>
            <p style="color: var(--text-dim); margin-top: 8px;">Try refining your search parameters.</p>
        </div>
        
        <div style="margin-top: 60px;">
            <a th:href="@{/}" class="pagination-btn">
                &lt;-- cd ..
            </a>
        </div>
    </div>
</body>
</html>
