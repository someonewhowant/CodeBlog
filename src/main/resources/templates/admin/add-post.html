<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/cabinet-layout}">
<head>
    <title>Add Post</title>
</head>
<body>
    <div layout:fragment="cabinet-content">
        <div class="card-glass" style="padding: 30px; max-width: 900px;">
            <h1 style="margin-bottom: 30px;">Создать новый пост</h1>
            
            <form th:action="@{/admin/add-post}" method="POST" enctype="multipart/form-data">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="title">Заголовок</label>
                    <input type="text" id="title" name="title" class="form-control" required placeholder="Введите заголовок">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group">
                        <label for="category">Категория</label>
                        <select id="category" name="category.id" class="form-control" required>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="image">Изображение (URL или файл)</label>
                        <input type="file" id="image" name="image" class="form-control" accept="image/*">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Теги</label>
                    <div style="display: flex; flex-wrap: wrap; gap: 15px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: var(--radius); border: 1px solid var(--border-subtle);">
                        <div th:each="tag : ${tags}" style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="tagIds" th:value="${tag.id}" th:id="'tag-' + ${tag.id}">
                            <label th:for="'tag-' + ${tag.id}" th:text="${tag.name}" style="font-size: 14px; cursor: pointer;"></label>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="body">Содержание (Markdown)</label>
                    <textarea id="body" name="body" class="form-control" style="height: 300px; font-family: var(--font-mono);" placeholder="Пишите здесь..."></textarea>
                    <p style="font-size: 12px; opacity: 0.6; margin-top: 5px;">Или загрузите .md файл ниже.</p>
                </div>

                <div class="form-group" style="margin-bottom: 30px;">
                    <label for="markdownFile">Загрузить Markdown файл</label>
                    <input type="file" id="markdownFile" name="markdownFile" class="form-control" accept=".md">
                </div>

                <div style="display: flex; gap: 15px;">
                    <button type="submit" class="btn btn-primary">Опубликовать</button>
                    <a th:href="@{/admin/dashboard}" class="btn btn-outline">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
