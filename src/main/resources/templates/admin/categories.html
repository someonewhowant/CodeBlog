<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Categories</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="admin-header">
            <h1>root@admin:~/categories$</h1>
            <div class="admin-actions">
                <a th:href="@{/admin/dashboard}" class="btn btn-outline">
                    <i class="bi bi-arrow-left"></i> back_to_dashboard()
                </a>
            </div>
        </div>

        <div class="card-glass" style="margin-bottom: 40px; padding: 32px;">
            <h2 class="section-title"><i class="bi bi-plus-square"></i> create_new_category()</h2>
            <form th:action="@{/admin/categories}" method="POST" style="display: flex; gap: 16px; align-items: flex-end;">
                <div class="form-group" style="flex-grow: 1; margin-bottom: 0;">
                    <label for="name" class="form-label">category_name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Enter category name..." required>
                </div>
                <div class="form-group" style="flex-grow: 1; margin-bottom: 0;">
                    <label for="slug" class="form-label">slug (optional)</label>
                    <input type="text" id="slug" name="slug" class="form-control" placeholder="auto-generated-if-empty">
                </div>
                <button type="submit" class="btn btn-primary" style="height: 48px; padding: 0 32px;">
                    <i class="bi bi-check2"></i> save()
                </button>
            </form>
        </div>
        
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NAME</th>
                        <th>SLUG</th>
                        <th style="text-align: right;">ACTIONS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="category : ${categories}">
                        <td th:text="${category.id}" style="font-family: var(--font-mono); color: var(--accent-orange);">1</td>
                        <td th:text="${category.name}">General</td>
                        <td th:text="${category.slug}" style="font-family: var(--font-mono); opacity: 0.7;">general</td>
                        <td>
                            <div class="admin-actions" style="justify-content: flex-end;">
                                <a th:href="@{/admin/delete-category/{id}(id=${category.id})}" 
                                   class="btn btn-outline btn-delete" 
                                   style="padding: 6px 12px; font-size: 0.8rem;"
                                   onclick="return confirm('rm -rf this_category?')">
                                    <i class="bi bi-trash3"></i> DELETE
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
