<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/cabinet-layout}">
<head>
    <title>Manage Categories</title>
</head>
<body>
    <div layout:fragment="cabinet-content">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px;">
            <!-- Add Category Form -->
            <div class="card-glass" style="padding: 30px;">
                <h2 style="margin-bottom: 20px;">Новая категория</h2>
                <form th:action="@{/admin/categories}" method="POST">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="name">Название</label>
                        <input type="text" id="name" name="name" class="form-control" required placeholder="Напр. Backend">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="slug">Slug (URL)</label>
                        <input type="text" id="slug" name="slug" class="form-control" required placeholder="Напр. backend">
                    </div>
                    <button type="submit" class="btn btn-primary">Создать категорию</button>
                </form>
            </div>

            <!-- Categories List -->
            <div class="card-glass" style="padding: 30px;">
                <h2 style="margin-bottom: 20px;">Существующие категории</h2>
                <div class="table-responsive">
                    <table class="table" style="width: 100%;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 1px solid var(--border-subtle);">
                                <th style="padding: 10px;">Название</th>
                                <th style="padding: 10px;">Slug</th>
                                <th style="padding: 10px; text-align: right;">Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="category : ${categories}" style="border-bottom: 1px solid var(--border-subtle);">
                                <td style="padding: 10px;" th:text="${category.name}">Name</td>
                                <td style="padding: 10px;" th:text="${category.slug}">Slug</td>
                                <td style="padding: 10px; text-align: right;">
                                    <a th:href="@{'/admin/delete-category/' + ${category.id}}" 
                                       style="color: #ff4d4d;" class="btn-text"
                                       onclick="return confirm('Вы уверены? Это может затронуть посты в этой категории.')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
