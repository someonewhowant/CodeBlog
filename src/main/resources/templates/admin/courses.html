<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/cabinet-layout}">
<head>
    <title>Manage Courses</title>
</head>
<body>
    <div layout:fragment="cabinet-content">
        <div class="card-glass" style="padding: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1 style="margin: 0;">Управление курсами</h1>
                <a th:href="@{/admin/add-course}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> Новый курс
                </a>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
                <div th:each="course : ${courses}" class="course-card-mini" style="display: flex; flex-direction: column; height: 100%;">
                    <div style="margin-bottom: 15px;">
                        <h4 th:text="${course.title}" style="margin-bottom: 5px;">Course Title</h4>
                        <span class="badge" th:text="${course.level}">Level</span>
                    </div>
                    <p style="font-size: 14px; opacity: 0.7; flex-grow: 1;" th:text="${#strings.abbreviate(course.description, 100)}">Description</p>
                    
                    <div style="margin-top: 20px; display: flex; gap: 10px; border-top: 1px solid var(--border-subtle); padding-top: 15px;">
                        <a th:href="@{'/admin/courses/' + ${course.id} + '/modules'}" class="btn-text">
                            <i class="bi bi-layers"></i> Модули
                        </a>
                        <a th:href="@{'/admin/courses/' + ${course.id} + '/quizzes'}" class="btn-text">
                            <i class="bi bi-patch-question"></i> Квизы
                        </a>
                        <a th:href="@{'/admin/edit-course/' + ${course.id}}" class="btn-text" title="Редактировать">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{'/admin/delete-course/' + ${course.id}}" class="btn-text" style="color: #ff4d4d; margin-left: auto;" 
                           onclick="return confirm('Вы уверены? Это удалит все модули и квизы курса.')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </div>

                <div th:if="${courses.empty}" class="empty-state" style="grid-column: 1 / -1;">
                    <p>Курсов пока нет. Создайте свой первый курс!</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
