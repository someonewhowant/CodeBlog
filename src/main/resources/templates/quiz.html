<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${title}">Quiz</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="post">
            <header class="post-header fade-in">
                <div class="post-category">QUIZ</div>
                <h1 class="post-title" th:text="${quiz.title}">Quiz Title</h1>
                <div class="post-meta">
                    <span th:text="${#lists.size(quiz.questions)} + ' questions'">0 questions</span>
                </div>
            </header>

            <div class="reading-container">
                <!-- Quiz Form -->
                <form th:if="${submitted == null}" th:action="@{/quiz/{id}/submit(id=${quiz.id})}" method="POST">
                    <div th:each="question, qStat : ${quiz.questions}" class="quiz-question-card" style="margin-bottom: 40px; padding: 30px; border: 1px solid var(--border-color); border-radius: 12px; background: var(--bg-card);">
                        <h3 style="font-family: var(--font-mono); margin-bottom: 24px; color: var(--accent-blue);">
                            <span th:text="${qStat.count} + '. '">1. </span>
                            <span th:text="${question.text}">Question text</span>
                        </h3>
                        
                        <div class="quiz-options">
                            <div th:each="option : ${question.options}" class="quiz-option" style="margin-bottom: 12px;">
                                <label style="display: flex; align-items: center; cursor: pointer; padding: 12px 20px; border: 1px solid var(--border-color); border-radius: 8px; transition: all 0.2s;">
                                    <input type="radio" th:name="'question_' + ${question.id}" th:value="${option.id}" required style="margin-right: 15px;">
                                    <span th:text="${option.text}">Option text</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div style="text-align: center; margin-top: 40px;">
                        <button type="submit" class="btn btn--primary btn--large" style="padding: 15px 40px; font-size: 1.1rem; background-color: var(--accent-orange); border-color: var(--accent-orange);">
                            <i class="bi bi-send-fill"></i> Submit Answers
                        </button>
                    </div>
                </form>

                <!-- Results Section -->
                <div th:if="${submitted != null}" class="quiz-results fade-in">
                    <div class="result-summary" style="text-align: center; margin-bottom: 60px; padding: 40px; background: var(--bg-card); border-radius: 16px; border: 2px solid var(--accent-blue);">
                        <h2 style="font-family: var(--font-mono); margin-bottom: 10px;">// QUIZ_RESULTS</h2>
                        <div class="score-display" style="font-size: 4rem; font-weight: 700; color: var(--accent-green); margin: 20px 0;">
                            <span th:text="${score}">8</span> / <span th:text="${total}">10</span>
                        </div>
                        <p class="text-dim" style="font-size: 1.2rem;">
                            Your accuracy: <span th:text="${(score * 100) / total} + '%'">80%</span>
                        </p>
                        
                        <a th:href="@{/course/{id}(id=${quiz.course.id})}" class="btn btn--outline" style="margin-top: 20px;">
                            <i class="bi bi-arrow-left"></i> Back to Course
                        </a>
                    </div>

                    <div class="detailed-results">
                        <h3 style="font-family: var(--font-mono); margin-bottom: 30px; color: var(--accent-blue);">// DETAILED_REVIEW</h3>
                        <div th:each="res, rStat : ${results}" class="result-card" style="margin-bottom: 30px; padding: 25px; border-radius: 12px; border: 1px solid var(--border-color);" th:styleappend="${res.isCorrect} ? 'border-left: 5px solid var(--accent-green);' : 'border-left: 5px solid var(--accent-red);'">
                            <h4 th:text="${rStat.count} + '. ' + ${res.question}" style="margin-bottom: 15px;">Question?</h4>
                            
                            <div style="display: flex; flex-direction: column; gap: 10px; font-size: 0.95rem;">
                                <div>
                                    <span class="text-dim">Your Answer: </span>
                                    <span th:text="${res.selected}" th:style="${res.isCorrect} ? 'color: var(--accent-green); font-weight: 600;' : 'color: var(--accent-orange); font-weight: 600; text-decoration: line-through;'">Answer</span>
                                </div>
                                <div th:if="${not res.isCorrect}">
                                    <span class="text-dim">Correct Answer: </span>
                                    <span th:text="${res.correct}" style="color: var(--accent-green); font-weight: 600;">Correct Answer</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <style>
            .quiz-option label:hover {
                background: var(--bg-body);
                border-color: var(--accent-blue);
            }
            .quiz-option input:checked + span {
                color: var(--accent-blue);
                font-weight: 600;
            }
            .quiz-option label:has(input:checked) {
                background: rgba(var(--accent-blue-rgb), 0.1);
                border-color: var(--accent-blue);
            }
            .text-success { color: var(--accent-green); }
            .text-dim { color: var(--text-dim); }
        </style>
    </th:block>
</body>
</html>
