<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/cabinet-layout}">
<head>
    <title>Manage Courses</title>
</head>
<body>
    <div layout:fragment="cabinet-content">
        <div class="card-glass p-xl">
            <div class="flex justify-between align-center mb-xl">
                <h1 class="m-0">Управление курсами</h1>
                <a th:href="@{/admin/add-course}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> Новый курс
                </a>
            </div>

            <div class="course-grid">
                <div th:each="course : ${courses}" class="course-card-mini flex flex-column h-full">
                    <div class="mb-m">
                        <h4 th:text="${course.title}" class="mb-xs">Course Title</h4>
                        <span class="badge" th:text="${course.level}">Level</span>
                    </div>
                    <p class="text-s text-dim flex-1" th:text="${#strings.abbreviate(course.description, 100)}">Description</p>
                    
                    <div class="mt-l flex gap-m py-m border-top">
                        <a th:href="@{'/admin/courses/' + ${course.id} + '/modules'}" class="btn-text">
                            <i class="bi bi-layers"></i> Модули
                        </a>
                        <a th:href="@{'/admin/courses/' + ${course.id} + '/quizzes'}" class="btn-text">
                            <i class="bi bi-patch-question"></i> Квизы
                        </a>
                        <a th:href="@{'/admin/edit-course/' + ${course.id}}" class="btn-text" title="Редактировать">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{'/admin/delete-course/' + ${course.id}}" class="btn-text text-red ml-auto" 
                           onclick="return confirm('Вы уверены? Это удалит все модули и квизы курса.')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </div>

                <div th:if="${courses.empty}" class="empty-state" style="grid-column: 1 / -1;">
                    <p>Курсов пока нет. Создайте свой первый курс!</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
