<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${title}">Home</title>
</head>
<body>

    <div layout:fragment="content">
        <section class="hero-minimal">
            <span class="hero-label">/dev/null/intro</span>
            <h1 class="author__heading">Hello World</h1>
            <p class="author__body">A blog about code, architecture, and the pursuit of elegant solutions.</p>
        </section>

        <section class="articles">
            <nav class="category-nav">
                <ul class="category-list">
                    <li>
                        <a th:href="@{/}" 
                           class="category-link" 
                           th:classappend="${currentCategory == null} ? 'active'">
                            <i class="bi bi-house-door"></i>
                            <span>Все</span>
                        </a>
                    </li>
                    <li th:each="cat : ${categories}">
                        <a th:href="@{/category/{slug}(slug=${cat.slug})}" 
                           class="category-link" 
                           th:classappend="${currentCategory == cat.slug} ? 'active'">
                            <i class="bi" th:classappend="${
                                cat.slug == 'java' ? 'bi-cup-hot' :
                                (cat.slug == 'javascript' ? 'bi-filetype-js' :
                                (cat.slug == 'docker' ? 'bi-box-seam' :
                                (cat.slug == 'aws' ? 'bi-cloud' :
                                (cat.slug == 'spring' ? 'bi-bootstrap' : 
                                (cat.slug == 'database' ? 'bi-database' :
                                (cat.slug == 'architecture' ? 'bi-diagram-3' : 'bi-tag'))))))
                            }"></i>
                            <span th:text="${cat.name}">Category</span>
                            <span class="category-count" th:text="${cat.posts.size()}">0</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <h2 class="section-title">
                <i class="bi bi-git"></i> recent_commits
            </h2>

            <ul class="article-grid">
                <li th:each="post : ${data}" class="article-card">
                    <div class="article-card__image-container">
                        <img th:if="${post.imageUrl}" 
                             th:src="${post.imageUrl}" 
                             th:alt="${post.title}" 
                             class="article-card__image"
                             loading="lazy"
                             decoding="async">
                        <div th:unless="${post.imageUrl}" class="article-card__placeholder"></div>
                    </div>
                    <div class="article-card__content">
                        <div class="article-card__meta">
                            <span class="article-card__date" th:text="${#temporals.format(post.createdAt, 'MMMM dd, yyyy')}">Date</span>
                            <span th:if="${post.category}" class="article-card__separator">•</span>
                            <span th:if="${post.category}" 
                               th:text="${post.category.name}"
                               class="article-card__category">Category</span>
                        </div>
                        <h3 class="article-card__title">
                            <a th:href="@{/post/{id}(id=${post.id})}" th:text="${post.title}" class="stretched-link">Post Title</a>
                        </h3>
                        <p class="article-card__excerpt" th:text="${#strings.abbreviate(post.body, 120)}"></p>
                        
                        <div class="article-card__footer">
                            <div th:if="${not #lists.isEmpty(post.tags)}" class="article-card__tags">
                                <span th:each="tag : ${post.tags}" 
                                   th:text="'#' + ${tag.name}"
                                   class="badge-tag" style="padding: 2px 8px; font-size: 0.7rem; border-radius: 4px; margin-right: 4px;">#tag</span>
                            </div>
                            <span class="read-more">read_insight <i class="bi bi-arrow-right"></i></span>
                        </div>
                    </div>
                </li>
            </ul>

            <div class="pagination">
                <a th:if="${currentPage > 1}" 
                   th:href="@{/(page=${currentPage - 1})}" 
                   class="pagination-btn">&larr; Newer Posts</a>
                   
                <a th:if="${currentPage < totalPages}" 
                   th:href="@{/(page=${currentPage + 1})}" 
                   class="pagination-btn">Older Posts &rarr;</a>
            </div>
        </section>
    </div>

</body>
</html>
