<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/cabinet-layout}">
<head>
    <title th:text="${title}">Course Builder</title>
    <style>
        .builder-module {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            margin-bottom: var(--spacing-xl);
            overflow: hidden;
        }
        .builder-module-header {
            padding: var(--spacing-m) var(--spacing-xl);
            background: var(--bg-surface-hover);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
        }
        .builder-module-body {
            padding: var(--spacing-m) var(--spacing-xl);
        }
        .builder-lesson {
            background: var(--bg-dark);
            border: 1px dashed var(--border-active);
            border-radius: var(--radius-sm);
            margin-bottom: var(--spacing-m);
            padding: var(--spacing-s) var(--spacing-m);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lesson-type-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            text-transform: uppercase;
            font-weight: bold;
            margin-right: var(--spacing-s);
        }
        .type-lecture { background: rgba(0, 123, 255, 0.2); color: var(--accent-blue); }
        .type-test { background: rgba(255, 193, 7, 0.2); color: var(--accent-orange); }
        .type-assignment { background: rgba(40, 167, 69, 0.2); color: var(--accent-green); }
        
        .builder-actions {
            display: flex;
            gap: var(--spacing-s);
        }
        .add-btn {
            background: transparent;
            border: 1px dashed var(--border-subtle);
            color: var(--text-dim);
            width: 100%;
            padding: var(--spacing-m);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-s);
        }
        .add-btn:hover {
            background: var(--bg-surface-hover);
            border-color: var(--border-active);
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div layout:fragment="cabinet-content">
        <div class="flex justify-between align-center mb-xl">
            <div>
                <h1 class="text-xl m-0" th:text="${course.title}">Course Title</h1>
                <p class="text-dim mt-xs">Hierarchy Builder: Modules & Lessons</p>
            </div>
            <div class="flex gap-m">
                <a th:href="@{/teacher/courses}" class="btn btn-outline btn-sm">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
                <a th:href="@{/course/{id}(id=${course.id})}" target="_blank" class="btn btn-primary btn-sm">
                    <i class="bi bi-eye"></i> Preview
                </a>
            </div>
        </div>

        <div class="builder-container">
            <div th:each="module : ${course.modules}" class="builder-module">
                <div class="builder-module-header">
                    <div class="flex align-center gap-m">
                        <i class="bi bi-grip-vertical text-dim"></i>
                        <span class="badge badge-dim font-mono" th:text="'MODULE ' + (module.orderIndex + 1)">MODULE 1</span>
                        <h3 class="m-0" th:text="${module.title}">Module Title</h3>
                    </div>
                    <div class="builder-actions">
                        <button class="btn btn-icon-sm" title="Edit Module" 
                                th:onclick="'openEditModuleModal(' + ${module.id} + ', \'' + ${module.title} + '\', ' + ${module.orderIndex} + ')'">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <a th:href="@{/teacher/courses/{id}/modules/{mid}/delete(id=${course.id}, mid=${module.id})}" 
                           class="btn btn-icon-sm text-red" title="Delete Module"
                           onclick="return confirm('Delete this module and all its lessons?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </div>
                <div class="builder-module-body">
                    <div th:each="lesson : ${module.lessons}" class="builder-lesson">
                        <div class="flex align-center">
                            <span class="lesson-type-badge" 
                                  th:classappend="'type-' + ${#strings.toLowerCase(lesson.type)}" 
                                  th:text="${lesson.type}">LECTURE</span>
                            <span th:text="${lesson.title}">Lesson Title</span>
                            <span th:if="${lesson.quiz != null}" class="ml-m text-xs text-orange">
                                <i class="bi bi-patch-question"></i> <span th:text="${lesson.quiz.title}">Quiz</span>
                            </span>
                        </div>
                        <div class="builder-actions">
                            <a th:href="@{/teacher/courses/{id}/modules/{mid}/lessons/{lid}/edit(id=${course.id}, mid=${module.id}, lid=${lesson.id})}" 
                               class="btn btn-icon-sm" title="Edit Lesson">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/teacher/courses/{id}/modules/{mid}/lessons/{lid}/delete(id=${course.id}, mid=${module.id}, lid=${lesson.id})}" 
                               class="btn btn-icon-sm text-red" title="Delete Lesson"
                               onclick="return confirm('Delete this lesson?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </div>
                    
                    <button class="add-btn mt-m" th:onclick="'openAddLessonModal(' + ${module.id} + ')'">
                        <i class="bi bi-plus-lg"></i> Add Lesson
                    </button>
                </div>
            </div>

            <button class="add-btn py-xl text-l font-bold" onclick="openAddModuleModal()">
                <i class="bi bi-plus-circle"></i> Add New Module
            </button>
        </div>

        <!-- Add Module Modal -->
        <div id="addModuleModal" class="modal">
            <div class="modal-content">
                <h3>Add New Module</h3>
                <form th:action="@{/teacher/courses/{id}/modules/add(id=${course.id})}" method="POST">
                    <div class="form-group mb-m">
                        <label>Module Title</label>
                        <input type="text" name="title" class="form-control" required placeholder="e.g. Introduction to Java">
                    </div>
                    <div class="flex justify-end gap-m">
                        <button type="button" class="btn btn-outline" onclick="closeModal('addModuleModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Module</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Edit Module Modal -->
        <div id="editModuleModal" class="modal">
            <div class="modal-content">
                <h3>Edit Module</h3>
                <form id="editModuleForm" method="POST">
                    <div class="form-group mb-m">
                        <label>Module Title</label>
                        <input type="text" id="editModuleTitle" name="title" class="form-control" required>
                    </div>
                    <div class="form-group mb-m">
                        <label>Order Index</label>
                        <input type="number" id="editModuleOrder" name="orderIndex" class="form-control" required>
                    </div>
                    <div class="flex justify-end gap-m">
                        <button type="button" class="btn btn-outline" onclick="closeModal('editModuleModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Add Lesson Modal -->
        <div id="addLessonModal" class="modal">
            <div class="modal-content">
                <h3>Add New Lesson</h3>
                <form id="addLessonForm" method="POST">
                    <div class="form-group mb-m">
                        <label>Lesson Title</label>
                        <input type="text" name="title" class="form-control" required placeholder="e.g. Variables and Types">
                    </div>
                    <div class="form-group mb-m">
                        <label>Lesson Type</label>
                        <select name="type" class="form-control" required>
                            <option value="LECTURE">Lecture (Markdown Content)</option>
                            <option value="TEST">Test (Quiz)</option>
                            <option value="ASSIGNMENT">Assignment</option>
                        </select>
                    </div>
                    <div class="flex justify-end gap-m">
                        <button type="button" class="btn btn-outline" onclick="closeModal('addLessonModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Lesson</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            function openAddModuleModal() {
                document.getElementById('addModuleModal').classList.add('active');
            }

            function openEditModuleModal(id, title, order) {
                const form = document.getElementById('editModuleForm');
                const courseId = [[${course.id}]];
                form.action = `/teacher/courses/${courseId}/modules/${id}/edit`;
                document.getElementById('editModuleTitle').value = title;
                document.getElementById('editModuleOrder').value = order;
                document.getElementById('editModuleModal').classList.add('active');
            }

            function openAddLessonModal(moduleId) {
                const form = document.getElementById('addLessonForm');
                const courseId = [[${course.id}]];
                form.action = `/teacher/courses/${courseId}/modules/${moduleId}/lessons/add`;
                document.getElementById('addLessonModal').classList.add('active');
            }

            function closeModal(modalId) {
                document.getElementById(modalId).classList.remove('active');
            }

            // Close modal when clicking outside
            window.onclick = function(event) {
                if (event.target.classList.contains('modal')) {
                    event.target.classList.remove('active');
                }
            }
        </script>
    </th:block>
</body>
</html>
