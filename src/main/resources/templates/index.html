<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${title}">Home</title>
</head>
<body>

    <div layout:fragment="content">
        <section class="author hero-minimal">
            <div class="hero-label">/dev/null/intro</div>
            <h1 class="author__heading">Hello World</h1>
            <p class="author__body">A blog about code, architecture, and the pursuit of elegant solutions.</p>
        </section>

        <section class="articles">
            <h2 class="section-title">
                <i class="bi bi-git"></i> recent_commits
            </h2>

            <ul class="article-grid">
                <li th:each="post : ${data}" class="article-card card-glass">
                    <div class="article-card__image-container">
                        <img th:if="${post.imageUrl}" 
                             th:src="${post.imageUrl}" 
                             th:alt="${post.title}" 
                             class="article-card__image"
                             loading="lazy"
                             decoding="async">
                        <div th:unless="${post.imageUrl}" class="article-card__placeholder"></div>
                    </div>
                    <div class="article-card__content">
                        <div class="article-card__meta">
                            <span class="article-list__date" th:text="${#temporals.format(post.createdAt, 'MMMM dd, yyyy')}">Date</span>
                            <span th:if="${post.category}" class="article-card__separator"></span>
                            <a th:if="${post.category}" 
                               th:href="@{/category/{slug}(slug=${post.category.slug})}" 
                               th:text="${post.category.name}"
                               class="article-card__category">Category</a>
                        </div>
                        <h3 class="article-card__title">
                            <a th:href="@{/post/{id}(id=${post.id})}" th:text="${post.title}" class="stretched-link">Post Title</a>
                        </h3>
                        <p th:text="${#strings.abbreviate(post.body, 120)}"></p>
                        <div th:if="${not #lists.isEmpty(post.tags)}" class="article-card__tags">
                            <a th:each="tag : ${post.tags}" 
                               th:href="@{/tag/{slug}(slug=${tag.slug})}" 
                               th:text="'#' + ${tag.name}"
                               class="badge-tag">#tag</a>
                        </div>
                        <div class="article-card__footer">
                            <span class="read-more">read_insight <i class="bi bi-arrow-right"></i></span>
                        </div>
                    </div>
                </li>
            </ul>

            <div class="pagination">
                <a th:if="${currentPage > 1}" 
                   th:href="@{/(page=${currentPage - 1})}" 
                   class="pagination-btn">&larr; Newer Posts</a>
                   
                <a th:if="${currentPage < totalPages}" 
                   th:href="@{/(page=${currentPage + 1})}" 
                   class="pagination-btn">Older Posts &rarr;</a>
            </div>
        </section>
    </div>

</body>
</html>
