<header class="header" th:fragment="header">
    <div class="container">
        <a th:href="@{/}" class="header__logo"><span>{</span> code_blog <span>}</span></a>
        
        <nav class="header__nav">
            <ul>
                <li><a th:href="@{/}" th:classappend="${currentUri == '/' or currentUri == ''} ? 'active'">/home</a></li>
                <li><a th:href="@{/articles}" th:classappend="${currentUri != null and currentUri.startsWith('/articles')} ? 'active'">/articles</a></li>
                <li><a th:href="@{/about}" th:classappend="${currentUri == '/about'} ? 'active'">/about</a></li>
                <li><a th:href="@{/admin/dashboard}" th:classappend="${currentUri != null and currentUri.startsWith('/admin')} ? 'active'">/admin</a></li>
            </ul>
        </nav>

        <div class="header__actions">
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                <i class="bi bi-moon-stars"></i>
                <i class="bi bi-sun"></i>
            </button>
            <button class="searchBtn" aria-expanded="false">
                <i class="bi bi-search"></i>
                <span>Search</span>
            </button>
        </div>
    </div>

    <!-- Search Bar Slide-down -->
    <div class="searchBar">
        <div class="container">
            <i class="bi bi-search search-icon-large"></i>
            <form th:action="@{/search}" method="GET" role="search" style="flex-grow: 1;">
                <input type="search" name="searchTerm" id="searchInput" placeholder="Search for insights..." autocomplete="off">
            </form>
            <div id="searchClose" class="search-close">CLOSE (ESC)</div>
        </div>
    </div>
</header>
