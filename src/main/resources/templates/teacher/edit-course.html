<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/cabinet-layout}">
<head>
    <title th:text="${title}">Edit Course</title>
</head>
<body>
    <div layout:fragment="cabinet-content">
        <div class="mb-xl">
            <h1 class="text-2xl font-bold mb-xs">Edit Course Settings</h1>
            <p class="text-dim" th:text="${course.title}">Course Title</p>
        </div>

        <form th:action="@{/teacher/courses/{id}/edit(id=${course.id})}" method="POST" enctype="multipart/form-data" class="glass p-xl rounded-l border-active max-w-800">
            <div class="form-group mb-xl">
                <label>Course Title</label>
                <input type="text" name="title" th:value="${course.title}" class="form-control" required>
            </div>

            <div class="form-group mb-xl">
                <label>Description</label>
                <textarea name="description" th:text="${course.description}" class="form-control" rows="4" required></textarea>
            </div>

            <div class="grid grid-cols-2 gap-xl mb-xl">
                <div class="form-group">
                    <label>Level</label>
                    <select name="level" class="form-control" required>
                        <option value="Beginner" th:selected="${course.level == 'Beginner'}">Beginner</option>
                        <option value="Intermediate" th:selected="${course.level == 'Intermediate'}">Intermediate</option>
                        <option value="Advanced" th:selected="${course.level == 'Advanced'}">Advanced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Duration (e.g. 12 Hours)</label>
                    <input type="text" name="duration" th:value="${course.duration}" class="form-control" required>
                </div>
            </div>

            <div class="form-group mb-xl">
                <label>Course Image</label>
                <div th:if="${course.imageUrl != null}" class="mb-m">
                    <img th:src="${course.imageUrl}" class="w-200 rounded border border-dim">
                </div>
                <input type="file" name="image" class="form-control" accept="image/*">
                <p class="text-xs text-dim mt-xs">Leave empty to keep current image.</p>
            </div>

            <div class="form-group mb-xl">
                <label>Overview Content (Markdown)</label>
                <textarea name="content" th:text="${course.content}" class="form-control" rows="10" required></textarea>
            </div>

            <div class="flex justify-between items-center">
                <a th:href="@{/teacher/courses/{id}/delete(id=${course.id})}" 
                   class="btn btn-outline text-red"
                   onclick="return confirm('Are you sure you want to delete this course and all its content?')">
                    <i class="bi bi-trash"></i> Delete Course
                </a>
                <div class="flex gap-m">
                    <a th:href="@{/teacher/courses}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
