<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/cabinet-layout}">
<head>
    <title th:text="${title}">My Courses</title>
</head>
<body>
    <div layout:fragment="cabinet-content">
        <div class="card-glass p-xl">
            <div class="flex justify-between align-center mb-xl">
                <h1 class="m-0">My Courses</h1>
                <a th:href="@{/teacher/courses/add}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> Create Course
                </a>
            </div>

            <div class="course-grid">
                <div th:each="course : ${courses}" class="course-card-mini flex flex-column h-full">
                    <div class="mb-m">
                        <h4 th:text="${course.title}" class="mb-xs">Course Title</h4>
                        <span class="badge" th:text="${course.level}">Level</span>
                    </div>
                    <p class="text-s text-dim flex-1" th:text="${#strings.abbreviate(course.description, 100)}">Description...</p>
                    
                    <div class="mt-l flex gap-m py-m border-top align-center justify-between">
                        <div class="flex gap-m">
                            <a th:href="@{/teacher/courses/{id}/builder(id=${course.id})}" class="btn-text" title="Builder">
                                <i class="bi bi-diagram-3"></i> Builder
                            </a>
                            <a th:href="@{/teacher/courses/{id}/edit(id=${course.id})}" class="btn-text" title="Settings">
                                <i class="bi bi-gear"></i> Settings
                            </a>
                        </div>
                        <a th:href="@{/course/{id}(id=${course.id})}" target="_blank" class="btn-text text-blue ml-auto">
                            View <i class="bi bi-box-arrow-up-right"></i>
                        </a>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(courses)}" class="empty-state" style="grid-column: 1 / -1;">
                    <p>No courses yet. Start by creating your first educational course.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
